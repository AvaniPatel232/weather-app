<!DOCTYPE html> 
<!-- Tells the browser that this file uses HTML5 -->

<html>
<!-- Root element of the webpage. Everything goes inside this -->

<head>
    <!-- Contains page settings like title, styles, metadata -->

    <title>Weather App</title>
    <!-- The name shown in the browser tab -->

    <style>
        /* CSS styling starts here */

        body {
            margin: 0;
            /* Removes default browser margin */

            font-family: Arial, sans-serif;
            /* Sets the font style for the whole page */

            height: 100vh;
            /* vh = viewport height (full screen height) */

            display: flex;
            /* Enables flexbox layout */

            justify-content: center;
            /* Horizontally centers the content */

            align-items: center;
            /* Vertically centers the content */

            background: linear-gradient(135deg, #4facfe, #00f2fe);
            /* Creates a gradient background */
        }

        .card {
            /* Styles the card container */

            background: white;
            /* White background */

            padding: 30px;
            /* Space inside the card */

            border-radius: 15px;
            /* Rounded corners */

            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            /* Adds shadow for a floating effect */

            text-align: center;
            /* Centers text */

            width: 300px;
            /* Sets card width */
        }

        h1 {
            margin-bottom: 20px;
            /* Adds space below the heading */
        }

        input {
            padding: 10px;
            /* Space inside input field */

            width: 80%;
            /* Input width */

            border-radius: 8px;
            /* Rounded corners */

            border: 1px solid #ccc;
            /* Light gray border */

            margin-bottom: 10px;
            /* Space below input */
        }

        button {
            padding: 10px 15px;
            /* Space inside button */

            border-radius: 8px;
            /* Rounded corners */

            border: none;
            /* Removes default border */

            background-color: #4facfe;
            /* Blue button color */

            color: white;
            /* Text color */

            cursor: pointer;
            /* Shows pointer when hovering */

            font-weight: bold;
            /* Makes text bold */
        }

        button:hover {
            background-color: #3a8be0;
            /* Changes button color when hovered */
        }

        #result {
            margin-top: 15px;
            /* Space above result text */

            font-size: 18px;
            /* Text size */

            font-weight: bold;
            /* Bold text */
        }

        .loading {
            color: gray;
            /* Loading text color */

            font-size: 14px;
        }
    </style>
</head>

<body>
<!-- Everything visible on the webpage goes inside body -->

    <div class="card">
    <!-- Main container for the weather app -->

        <h1>Weather App 🌤</h1>
        <!-- App title -->

        <input type="text" id="city" placeholder="Enter city name">
        <!-- Text box where user types the city name -->

        <br>
        <!-- Line break -->

        <button onclick="getWeather()">Check Weather</button>
        <!-- Button that calls the getWeather() function when clicked -->

        <p id="result"></p>
        <!-- This paragraph will display the weather result -->
    </div>

    <script>
        // JavaScript starts here

        async function getWeather() {
        // Function that runs when the button is clicked

            const city = document.getElementById("city").value;
            // Gets the value typed in the input field

            const apiKey = "ec04bcb2b867ec3c1844298945c84d68";
            // API key used to access OpenWeather API

            const result = document.getElementById("result");
            // Gets the paragraph where result will be displayed

            if (!city) {
                // Checks if user didn't type anything

                result.innerText = "Please enter a city!";
                // Shows error message

                return;
                // Stops the function
            }

            result.innerHTML = "<span class='loading'>Loading...</span>";
            // Displays loading text while data is being fetched

            try {
                // Try block handles API request

                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`
                );
                // Sends HTTP request to OpenWeather API
                // city = user input
                // appid = API key
                // units=metric = temperature in Celsius

                const data = await response.json();
                // Converts API response into JSON format

                if (data.cod === "404") {
                // If city is not found

                    result.innerText = "City not found!";
                    // Displays error
                } 
                else {

                    result.innerText =
                        `${data.name}: ${data.main.temp}°C, ${data.weather[0].description}`;
                    // Displays city name
                    // temperature
                    // weather description
                }

            } catch (error) {
            // If something goes wrong (network error etc.)

                result.innerText = "Something went wrong.";
                // Displays error message
            }
        }
    </script>

</body>
</html>
